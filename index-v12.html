<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aflora Club | Flores Comestiveis</title>
    <meta
      name="description"
      content="Flores comestíveis frescas para restaurantes, cafés e hotéis em Porto Alegre."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --aflora-lilas-600: #a66bea;
        --aflora-lilas-800: #6d35b3;
        --aflora-lima-500: #d7f05b;
        --aflora-pink-500: #f05fa8;
        --aflora-cream-50: #fffdf8;
        --aflora-cream-100: #f8f4eb;
        --aflora-gray-600: #6b6872;
        --aflora-ink-900: #19161f;
        --aflora-white: #ffffff;
        --success-whatsapp: #25d366;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Manrope", sans-serif;
        color: var(--aflora-ink-900);
        background: #17161c;
        overflow-x: hidden;
      }

      .container {
        width: min(1200px, calc(100% - 3rem));
        margin: 0 auto;
      }

      .site-header {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 20;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.48),
          rgba(0, 0, 0, 0.02)
        );
      }

      .nav-wrap {
        min-height: 88px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 2rem;
      }

      .brand {
        font-family: "Syne", sans-serif;
        font-size: clamp(1.1rem, 1rem + 0.65vw, 1.55rem);
        font-weight: 800;
        letter-spacing: 0.01em;
        color: var(--aflora-white);
        text-transform: lowercase;
        text-decoration: none;
        text-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      }

      .brand span {
        color: var(--aflora-lilas-600);
      }

      .main-nav ul {
        list-style: none;
        display: flex;
        align-items: center;
        gap: 1.3rem;
      }

      .main-nav a {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: color 0.2s ease;
      }

      .main-nav a:hover,
      .main-nav a:focus-visible {
        color: var(--aflora-lima-500);
        outline: none;
      }

      .btn {
        font-family: inherit;
        font-weight: 700;
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition:
          transform 0.18s ease,
          filter 0.18s ease,
          box-shadow 0.18s ease;
      }

      .btn:focus-visible {
        outline: 2px solid var(--aflora-lilas-800);
        outline-offset: 2px;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn-whatsapp {
        background: rgba(166, 107, 234, 0.28);
        color: var(--aflora-white);
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.62rem 1rem;
        border: 1px solid rgba(166, 107, 234, 0.7);
        backdrop-filter: blur(4px);
      }

      .hero {
        min-height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
        background: #15131b;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(8, 8, 10, 0.58) 0%,
          rgba(8, 8, 10, 0.42) 42%,
          rgba(8, 8, 10, 0.74) 100%
        );
        z-index: 1;
      }

      .hero-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
      }

      .hero-grid {
        display: grid;
        place-items: center;
        align-content: center;
        row-gap: 0.75rem;
        width: 100%;
        min-height: 100%;
        padding: clamp(4.6rem, 7.5vh, 5.8rem) 0 2rem;
        text-align: center;
        position: relative;
        z-index: 2;
      }

      .hero-copy {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -48%);
        width: min(640px, calc(100% - 3rem));
      }

      .hero-topline {
        font-size: 0.7rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.86);
        font-weight: 700;
        margin-bottom: 0.1rem;
      }

      .hero-logo {
        font-family: "Syne", sans-serif;
        font-size: clamp(1.05rem, 2vw, 1.45rem);
        font-weight: 800;
        letter-spacing: 0.12em;
        line-height: 1;
        color: var(--aflora-white);
        text-transform: uppercase;
        text-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
        max-width: none;
      }

      .hero-kicker {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.42rem 0.75rem;
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 700;
        background: var(--aflora-lima-500);
        color: var(--aflora-ink-900);
        margin-bottom: 0.9rem;
      }

      .hero-content {
        max-width: 640px;
        margin-top: 0;
        padding: 0;
      }

      .hero h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(1.55rem, 4.4vw, 3.2rem);
        line-height: 1.02;
        letter-spacing: 0.08em;
        color: var(--aflora-white);
        margin-bottom: 0.55rem;
        max-width: 13ch;
        text-transform: uppercase;
        margin-inline: auto;
      }

      .hero p {
        font-size: clamp(0.82rem, 0.95vw, 0.9rem);
        color: rgba(255, 255, 255, 0.84);
        line-height: 1.4;
        max-width: 32ch;
        margin-inline: auto;
      }

      .hero-actions {
        position: absolute;
        left: 50%;
        bottom: 8rem;
        transform: translateX(-50%);
        margin-top: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.8rem;
        z-index: 3;
        width: min(1200px, calc(100% - 3rem));
        pointer-events: none;
      }

      .hero-actions .btn {
        pointer-events: auto;
      }

      .btn-primary {
        background: var(--aflora-lima-500);
        color: var(--aflora-ink-900);
        padding: 0.72rem 1.3rem;
        border-radius: 0;
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
      }

      .btn-primary:hover {
        filter: brightness(0.93);
      }

      .btn-secondary {
        display: none;
      }

      .hero-card {
        display: none;
      }

      .hero-card h2 {
        font-family: "Syne", sans-serif;
        font-size: 1.12rem;
        margin-bottom: 0.6rem;
        color: var(--aflora-white);
      }

      .hero-card ul {
        list-style: none;
        display: grid;
        gap: 0.75rem;
      }

      .hero-card li {
        padding: 0.66rem 0.72rem;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.25);
        font-size: 0.86rem;
        font-weight: 700;
      }

      .hero-card small {
        margin-top: 0.75rem;
        display: block;
        color: rgba(255, 255, 255, 0.82);
        font-size: 0.78rem;
      }

      .scroll-cue {
        position: absolute;
        left: 50%;
        bottom: 1.1rem;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.88);
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 700;
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 0.3rem;
        pointer-events: none;
      }

      .scroll-cue::after {
        content: "";
        width: 10px;
        height: 10px;
        border-right: 2px solid rgba(255, 255, 255, 0.92);
        border-bottom: 2px solid rgba(255, 255, 255, 0.92);
        transform: rotate(45deg);
        animation: scroll-arrow-bounce 1.2s ease-in-out infinite;
      }

      @keyframes scroll-arrow-bounce {
        0%,
        100% {
          transform: rotate(45deg) translate(0, 0);
          opacity: 0.9;
        }
        50% {
          transform: rotate(45deg) translate(4px, 4px);
          opacity: 0.55;
        }
      }

      @media (max-width: 980px) {
        .main-nav {
          display: none;
        }

        .nav-wrap {
          min-height: 76px;
        }

        .hero {
          height: auto;
          min-height: 100vh;
        }

        .hero-grid {
          row-gap: 0.9rem;
          padding-top: 6.1rem;
          padding-bottom: 1rem;
        }

        .hero-copy {
          top: 48%;
          width: calc(100% - 2rem);
        }

        .hero-actions {
          bottom: 3.1rem;
        }

        .scroll-cue {
          bottom: 0.85rem;
        }

        .hero-logo {
          font-size: clamp(0.95rem, 4.8vw, 1.2rem);
        }

        .hero-content {
          margin: 0.4rem 0 0;
          max-width: 100%;
        }

        .hero h1 {
          font-size: clamp(1.38rem, 8.2vw, 2rem);
          margin-inline: auto;
        }

        .hero p {
          max-width: 27ch;
          margin-inline: auto;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="#">aflora<span>.club</span></a>

        <nav class="main-nav" aria-label="Menu principal">
          <ul>
            <li><a href="#inicio">Intro</a></li>
            <li><a href="#packs">Packs</a></li>
            <li><a href="#produto">Produto</a></li>
            <li><a href="#contato">Contato</a></li>
          </ul>
        </nav>

        <a
          class="btn btn-whatsapp"
          href="https://wa.me/5551999999999?text=Ol%C3%A1%21%20Quero%20fazer%20um%20pedido%20de%20flores%20comest%C3%ADveis."
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Falar no WhatsApp"
        >
          WhatsApp
        </a>
      </div>
    </header>

    <main id="inicio">
      <section class="hero">
        <video
          class="hero-video"
          src="hero-imgs/magnific_use-this-image-as-the-bas_2886030875.mp4"
          autoplay
          muted
          loop
          playsinline
          aria-hidden="true"
        ></video>
        <div class="container hero-grid">
          <div class="hero-copy">
          <div class="hero-topline">Flores comestíveis</div>

            <div class="hero-content">
              <h1>Para chefs, negócios e criativos</h1>
              <p>
                Pedidos pelo WhatsApp, sob encomenda.
              </p>
            </div>
          </div>

          <div class="hero-actions">
            <a class="btn btn-primary" href="#packs">Explorar packs</a>
            <a
              class="btn btn-secondary"
              href="https://wa.me/5551999999999?text=Ol%C3%A1%21%20Quero%20conhecer%20os%20packs%20de%20flores%20comest%C3%ADveis."
              target="_blank"
              rel="noopener noreferrer"
            >
              Pedir no WhatsApp
            </a>
          </div>

          <div class="scroll-cue">Scroll para continuar</div>

        </div>
      </section>
    </main>
  </body>
</html>
