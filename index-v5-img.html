<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aflora Club | V5 Imagem</title>
    <meta
      name="description"
      content="Versao V5 com fundo em imagem estatica para hero."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --aflora-lilas-600: #a66bea;
        --aflora-lilas-800: #6d35b3;
        --aflora-lima-500: #d7f05b;
        --aflora-white: #ffffff;
        --aflora-ink-900: #19161f;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Manrope", sans-serif;
        background: #17161c;
        color: var(--aflora-ink-900);
        overflow-x: hidden;
      }

      .container {
        width: min(1200px, calc(100% - 3rem));
        margin: 0 auto;
      }

      .site-header {
        position: absolute;
        inset: 0 0 auto 0;
        z-index: 10;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.48),
          rgba(0, 0, 0, 0.02)
        );
      }

      .nav-wrap {
        min-height: 88px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .brand {
        font-family: "Syne", sans-serif;
        font-size: clamp(1.1rem, 1rem + 0.65vw, 1.55rem);
        font-weight: 800;
        color: var(--aflora-white);
        text-transform: lowercase;
        text-decoration: none;
      }

      .brand span {
        color: var(--aflora-lilas-600);
      }

      .main-nav ul {
        list-style: none;
        display: flex;
        align-items: center;
        gap: 1.3rem;
      }

      .main-nav a {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .btn {
        font-family: inherit;
        font-weight: 700;
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .btn-whatsapp {
        background: rgba(166, 107, 234, 0.28);
        color: var(--aflora-white);
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.62rem 1rem;
        border: 1px solid rgba(166, 107, 234, 0.7);
        backdrop-filter: blur(4px);
      }

      .hero {
        min-height: 100dvh;
        position: relative;
        display: flex;
        align-items: center;
        overflow: hidden;
      }

      .hero-bg {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(
            180deg,
            rgba(8, 8, 10, 0.58) 0%,
            rgba(8, 8, 10, 0.42) 42%,
            rgba(8, 8, 10, 0.74) 100%
          ),
          url("hero-imgs/magnific_ultrarealistic-cinematic-_2885978136.png");
        background-size: cover;
        background-position: center;
        z-index: 0;
      }

      .hero-grid {
        width: 100%;
        min-height: 100dvh;
        position: relative;
        z-index: 1;
        display: grid;
        align-content: center;
        justify-items: start;
        padding-top: 6rem;
        padding-bottom: 2.5rem;
      }

      .hero-topline {
        font-size: 0.7rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.86);
        font-weight: 700;
        margin-bottom: 0.4rem;
      }

      .hero-content h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(1.8rem, 4.6vw, 3.4rem);
        line-height: 1.05;
        letter-spacing: 0.06em;
        color: var(--aflora-white);
        margin-bottom: 0.7rem;
        max-width: 14ch;
        text-transform: uppercase;
      }

      .hero-content p {
        font-size: clamp(0.86rem, 1vw, 0.95rem);
        color: rgba(255, 255, 255, 0.85);
        max-width: 34ch;
      }

      .hero-actions {
        margin-top: 1.3rem;
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }

      .btn-primary {
        background: var(--aflora-lilas-600);
        color: var(--aflora-white);
        padding: 0.74rem 1.35rem;
        border-radius: 0;
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        color: var(--aflora-white);
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 0.74rem 1.2rem;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      @media (max-width: 980px) {
        .main-nav {
          display: none;
        }

        .hero-grid {
          justify-items: center;
          text-align: center;
        }

        .hero-content h1 {
          margin-inline: auto;
        }

        .hero-content p {
          margin-inline: auto;
        }

        .hero-actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="#">aflora<span>.club</span></a>

        <nav class="main-nav" aria-label="Menu principal">
          <ul>
            <li><a href="#inicio">Intro</a></li>
            <li><a href="#packs">Packs</a></li>
            <li><a href="#produto">Produto</a></li>
            <li><a href="#contato">Contato</a></li>
          </ul>
        </nav>

        <a
          class="btn btn-whatsapp"
          href="https://wa.me/5551999999999?text=Ol%C3%A1%21%20Quero%20fazer%20um%20pedido%20de%20flores%20comest%C3%ADveis."
          target="_blank"
          rel="noopener noreferrer"
          >WhatsApp</a
        >
      </div>
    </header>

    <main id="inicio">
      <section class="hero">
        <div class="hero-bg" aria-hidden="true"></div>
        <div class="container hero-grid">
          <div class="hero-topline">Flores comestiveis</div>
          <div class="hero-content">
            <h1>Para chefs, negocios e criativos</h1>
            <p>Pedidos pelo WhatsApp, sob encomenda.</p>
          </div>
          <div class="hero-actions">
            <a class="btn btn-primary" href="#packs">Explorar packs</a>
            <a
              class="btn btn-secondary"
              href="https://wa.me/5551999999999?text=Ol%C3%A1%21%20Quero%20conhecer%20os%20packs%20de%20flores%20comest%C3%ADveis."
              target="_blank"
              rel="noopener noreferrer"
              >Pedir no WhatsApp</a
            >
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
