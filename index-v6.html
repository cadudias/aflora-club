<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aflora Club | V6 Clean</title>
    <meta
      name="description"
      content="Aflora Club: flores comestiveis para restaurantes, cafes e hoteis."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-900: #111019;
        --bg-800: #191529;
        --text-100: #f4f1ea;
        --text-300: #d7d1c5;
        --line-200: rgba(255, 255, 255, 0.28);
        --accent: #d8cdb7;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        font-family: "Manrope", sans-serif;
        background: var(--bg-900);
        color: var(--text-100);
        overflow-x: hidden;
      }

      .container {
        width: min(1320px, calc(100% - 4rem));
        margin: 0 auto;
      }

      .hero {
        position: relative;
        min-height: 100dvh;
        isolation: isolate;
        background:
          linear-gradient(
            180deg,
            rgba(35, 23, 55, 0.48) 0%,
            rgba(20, 14, 35, 0.52) 45%,
            rgba(14, 11, 25, 0.75) 100%
          ),
          linear-gradient(
            145deg,
            rgba(107, 82, 149, 0.26) 0%,
            rgba(18, 15, 33, 0.15) 40%,
            rgba(18, 15, 33, 0.3) 100%
          );
      }

      .hero-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
        filter: saturate(82%) contrast(95%) brightness(72%);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: linear-gradient(
          180deg,
          rgba(10, 8, 18, 0.18) 0%,
          rgba(10, 8, 18, 0.45) 55%,
          rgba(10, 8, 18, 0.75) 100%
        );
      }

      .site-header {
        position: absolute;
        inset: 0 0 auto 0;
        z-index: 2;
        border-top: 1px solid rgba(180, 151, 230, 0.45);
        background: linear-gradient(
          to bottom,
          rgba(14, 12, 24, 0.45),
          rgba(14, 12, 24, 0)
        );
      }

      .nav-wrap {
        min-height: 88px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1.5rem;
      }

      .menu-trigger {
        width: 28px;
        height: 18px;
        display: grid;
        align-content: space-between;
      }

      .menu-trigger span {
        display: block;
        height: 1px;
        background: rgba(244, 241, 234, 0.82);
      }

      .brand {
        font-family: "Outfit", sans-serif;
        font-size: 2.1rem;
        font-weight: 300;
        letter-spacing: 0.22em;
        text-transform: lowercase;
        color: rgba(244, 241, 234, 0.94);
        text-decoration: none;
        margin-left: 5vw;
      }

      .nav-links {
        list-style: none;
        display: flex;
        align-items: center;
        gap: 2rem;
      }

      .nav-links a {
        font-family: "Outfit", sans-serif;
        font-size: 0.82rem;
        letter-spacing: 0.09em;
        color: rgba(244, 241, 234, 0.88);
        text-decoration: none;
        text-transform: uppercase;
        transition: color 0.25s ease;
      }

      .nav-links a:hover,
      .nav-links a:focus-visible {
        color: var(--accent);
        outline: none;
      }

      .hero-content {
        min-height: 100dvh;
        display: grid;
        align-content: center;
        justify-items: center;
        text-align: center;
        padding-top: 6.5rem;
        padding-bottom: 4.5rem;
      }

      h1 {
        font-family: "Outfit", sans-serif;
        font-size: clamp(2rem, 4.9vw, 4rem);
        line-height: 1.1;
        font-weight: 300;
        letter-spacing: 0.01em;
        color: rgba(244, 241, 234, 0.97);
        max-width: 22ch;
        text-wrap: balance;
      }

      .hero-subtitle {
        margin-top: 1.2rem;
        font-size: clamp(0.9rem, 1.15vw, 1.05rem);
        color: var(--text-300);
        letter-spacing: 0.01em;
      }

      .hero-actions {
        margin-top: 2.2rem;
        display: flex;
        align-items: center;
        gap: 0.85rem;
      }

      .btn {
        border: 1px solid var(--line-200);
        border-radius: 999px;
        padding: 0.72rem 1.2rem;
        text-decoration: none;
        color: var(--text-100);
        font-size: 0.74rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition:
          transform 0.2s ease,
          border-color 0.2s ease,
          background-color 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        border-color: rgba(216, 205, 183, 0.72);
      }

      .btn-primary {
        background: rgba(216, 205, 183, 0.12);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.04);
      }

      @media (max-width: 980px) {
        .container {
          width: calc(100% - 2rem);
        }

        .brand {
          margin-left: 0;
          font-size: 1.7rem;
          letter-spacing: 0.16em;
        }

        .nav-links {
          gap: 1rem;
        }

        .nav-links a {
          font-size: 0.72rem;
        }

        .hero-content {
          padding-top: 5.4rem;
        }

        h1 {
          max-width: 16ch;
        }
      }

      @media (max-width: 640px) {
        .nav-links li:first-child {
          display: none;
        }

        .hero-actions {
          flex-direction: column;
          width: min(280px, 100%);
        }

        .btn {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="hero" id="inicio">
      <video
        class="hero-video"
        src="hero-imgs/magnific_use-this-image-as-the-bas_2886030875.mp4"
        autoplay
        muted
        loop
        playsinline
        aria-hidden="true"
      ></video>

      <header class="site-header">
        <div class="container nav-wrap">

          <a class="brand" href="#">aflora.club</a>

          <ul class="nav-links" aria-label="Menu principal">
            <li><a href="#packs">Packs</a></li>
            <li><a href="#contato">Contato</a></li>
          </ul>
        </div>
      </header>

      <div class="container hero-content">
        <h1>Flores comestiveis que transformam experiencias a mesa</h1>
        <p class="hero-subtitle">Cultivo sob demanda em Porto Alegre</p>

        <div class="hero-actions">
          <a class="btn btn-primary" href="#packs">Ver packs</a>
          <a
            class="btn btn-secondary"
            href="https://wa.me/5551999999999?text=Ol%C3%A1%21%20Quero%20fazer%20um%20pedido%20de%20flores%20comest%C3%ADveis."
            target="_blank"
            rel="noopener noreferrer"
            >WhatsApp</a
          >
        </div>
      </div>
    </main>
  </body>
</html>
